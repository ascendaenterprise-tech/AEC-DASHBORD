  <line x1="-34" y1="-18" x2="0" y2="8" stroke="#555" stroke-width="0.4"/>
  <line x1="34" y1="-18" x2="0" y2="8" stroke="#555" stroke-width="0.4"/>
  <line x1="-34" y1="-18" x2="0" y2="-28" stroke="#666" stroke-width="0.3"/>
  <line x1="34" y1="-18" x2="0" y2="-28" stroke="#666" stroke-width="0.3"/>
  <g transform="translate(-16, 24)">
